<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="sendClick('checkout')">

<div class="nav">
    <div id="userDisplay"></div>
    <div>
        <a href="index.html" onclick="sendClick('nav_home')">Home</a>
        <a href="product.html" onclick="sendClick('nav_product')">Product</a>
        <a href="cart.html" onclick="sendClick('nav_cart')">Cart</a>
    </div>
</div>

<div class="card">
    <h2>Payment Successful 🎉</h2>
    <p>Thank you for your purchase!</p>

    <button class="btn" onclick="goHome()">⬅ Back to Home</button>
    <button class="btn" onclick="downloadLogs()">📥 Download Logs</button>
</div>

<script src="script.js"></script>

<script>
function goHome() {
    window.location.href = "index.html";
}

// Download logs as JSON file
function downloadLogs() {
    const logs = JSON.parse(localStorage.getItem("logs")) || [];
    const counts = JSON.parse(localStorage.getItem("counts")) || {};

    const data = {
        user: localStorage.getItem("user"),
        totalClicks: counts,
        history: logs
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "user_click_logs.json";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
